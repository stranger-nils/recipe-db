<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Recipe</title>
    <style>
        body {
        font-family: Arial;
        margin: 0;
        padding: 0;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        background: #fafafa;
        }
        .main-layout {
            display: flex;
            gap: 40px;
            width: 100vw;
            justify-content: center;
            position: relative;
        }
        .main-content {
            flex: 2;
            max-width: 1000px;
            background: #fff;
            padding: 20px;
            box-sizing: border-box;
        }
        label { display: block; margin-top: 15px; }
        input, textarea { width: 100%; padding: 8px; margin-top: 5px; }
        .actions { margin-top: 20px; }
        .actions button, .actions a { margin-right: 10px; }
    </style>
</head>
<body>
    <div class="main-layout">
        <div class="main-content">
            <h1>{% if is_new %}Nytt recept{% else %}Edit Recipe{% endif %}</h1>
            <form method="post">
                <label>Title:
                    <input type="text" name="title" value="{{ recipe['title'] }}" required>
                </label>
                <label>Description:
                    <textarea name="description">{{ recipe['description'] }}</textarea>
                </label>
                <label>Ingredients:
                    <textarea name="ingredients">{{ ingredients_text }}</textarea>
                </label>
                <label>Instructions:
                    <textarea name="instructions">{{ recipe['instructions'] }}</textarea>
                </label>
                <label>Kök (kitchen):
                    <input type="text" name="kitchen" value="{{ recipe['kitchen'] }}" placeholder="t.ex. Italienskt, Mexikanskt, Svenskt">
                </label>
                <label>Typ (type):
                    <input type="text" name="type" value="{{ recipe['type'] }}" placeholder="förrätt, huvudrätt, sidorätt, komponent, efterrätt, …">
                </label>
                <label>Tags:
                    <input type="text" name="tags" value="{{ recipe['tags'] }}">
                </label>
                <label>Notes:
                    <textarea name="notes">{{ recipe['notes'] }}</textarea>
                </label>
                <div class="actions">
                    <button type="submit">Save</button>
                    {% if is_new %}
                        <a href="{{ url_for('index') }}">Discard</a>
                    {% else %}
                        <a href="{{ url_for('recipe_detail', recipe_id=recipe['id']) }}">Discard</a>
                    {% endif %}
                </div>
            </form>
        </div>
    </div>
</body>
</html>
