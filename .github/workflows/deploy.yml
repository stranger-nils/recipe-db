name: Deploy to VPS

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd ${{ secrets.APP_DIR }}
            git pull origin master
            mkdir -p data/backups
            docker compose up --build -d
            docker image prune -f
            # Idempotent daily cron entries — replaces prior backup_db.py + qc-check lines.
            # Note: appleboy/ssh-action runs as ${{ secrets.SSH_USER }}; if that
            # user lacks crontab access, the lines are installed under that
            # user's crontab and may not run. In that case, install manually
            # under root once (see CLAUDE.md / WORKFLOW notes).
            BACKUP_LINE="5 3 * * * BACKUP_DIR=${{ secrets.APP_DIR }}/data/backups RECIPE_DB_PATH=${{ secrets.APP_DIR }}/data/recipe.db /usr/bin/python3 ${{ secrets.APP_DIR }}/scripts/backup_db.py daily >> ${{ secrets.APP_DIR }}/data/backups/cron.log 2>&1"
            QC_LINE="30 3 * * * /usr/bin/python3 ${{ secrets.APP_DIR }}/scripts/db_quality_check.py ${{ secrets.APP_DIR }}/data/recipe.db --uploads-dir=${{ secrets.APP_DIR }}/data/uploads >> ${{ secrets.APP_DIR }}/data/backups/qc.log 2>&1"
            ( crontab -l 2>/dev/null | grep -v 'backup_db.py daily' | grep -v 'db_quality_check.py' ; echo "$BACKUP_LINE" ; echo "$QC_LINE" ) | crontab -
