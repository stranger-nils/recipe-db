services:
  recipe-db:
    build: .
    restart: unless-stopped
    ports:
      - "127.0.0.1:5001:5001"
    volumes:
      - ./data/recipe.db:/app/recipe.db
      - ./data/uploads:/app/static/uploads
      - ./data/backups:/app/backups
    env_file:
      - .env
    environment:
      - DATABASE_URL=sqlite:///recipe.db
      - BACKUP_DIR=/app/backups
      - RECIPE_DB_PATH=/app/recipe.db
